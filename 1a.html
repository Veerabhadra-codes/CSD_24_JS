<!DOCTYPE html>
<html>
    <head>
        <title>CAPITAL LETTERS</title>
    </head>

    <body>
        <script>
            const cap = function(sentence)
            {
                let str = sentence.split(" ");

                for(let i = 0; i < str.length; i++)
                {
                    str[i] = str[i][0].toUpperCase() + str[i].substring(1);
                }

                return str.join(" ");
            }

            document.write(cap("javascript and jquery interactive front end web development"));
            document.write("<br>");
            document.write(cap("i love my india"));
        </script>
    </body>
</html>
